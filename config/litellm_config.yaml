# LiteLLM Proxy — cascade automatique Ollama → Gemini → Claude
# Usage: litellm --config config/litellm_config.yaml --port 4000
# Clés API: GOOGLE_API_KEY, ANTHROPIC_API_KEY (voir .env)
#
# Note: complexity_router fonctionne via le SDK Python LiteLLM mais pas via le
# serveur proxy HTTP (limitation LiteLLM 1.82). On utilise à la place une cascade
# directe sur les modèles Ollama avec fallbacks Gemini/Claude.

model_list:
  # Modèles Ollama (provider primaire, 0€)
  # ollama_chat/ (pas ollama/) → utilise /api/chat qui supporte tool calling natif
  - model_name: qwen3
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://localhost:11434

  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434

  - model_name: qwen2.5
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434

  # Providers cloud (fallback)
  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

# Cascade : gemini en primaire (tool calling fiable) → claude si quota dépassé
# qwen3/qwen2.5-coder : utilisables en direct mais incompatibles avec les tools Roo Code
litellm_settings:
  num_retries: 2
  drop_params: true   # ignore les params non supportés (ex. parallel_tool_calls)
  fallbacks:
    - gemini: [claude-sonnet, qwen3]
    - qwen3: [gemini, claude-sonnet]
    - qwen2.5-coder: [gemini, claude-sonnet]
    - qwen2.5: [gemini, claude-sonnet]
