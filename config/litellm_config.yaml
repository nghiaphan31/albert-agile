# LiteLLM Proxy — cascade automatique Ollama → Gemini → Claude
# Usage: litellm --config config/litellm_config.yaml --port 4000
# Clés API: GOOGLE_API_KEY, ANTHROPIC_API_KEY (voir .env)
#
# Note: complexity_router fonctionne via le SDK Python LiteLLM mais pas via le
# serveur proxy HTTP (limitation LiteLLM 1.82). On utilise à la place une cascade
# directe sur les modèles Ollama avec fallbacks Gemini/Claude.

model_list:
  # Modèles Ollama (provider primaire, 0€)
  # ollama_chat/ + fake_stream=true → LiteLLM appelle en non-streaming,
  # le post-call hook peut corriger la réponse AVANT génération des chunks SSE
  - model_name: qwen3
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  - model_name: qwen2.5
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  - model_name: hermes3
    litellm_params:
      model: ollama_chat/hermes3:8b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  - model_name: granite3.3
    litellm_params:
      model: ollama_chat/granite3.3:8b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  # Alias routage sémantique (custom_roo_hook) — architect / ingest / worker
  - model_name: architect
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
  - model_name: ingest
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: worker
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120

  # Providers cloud (fallback)
  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Alias LangGraph via LiteLLM (AGILE_USE_LITELLM_PROXY=true)
  - model_name: tier1-n0
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
  - model_name: tier2-n0
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120

# Paramètres de résilience (spec §5.1b)
router_settings:
  routing_strategy: simple-shuffle
  enable_fallbacks: true
  allowed_fails: 3
  cooldown_time: 3600

# Cascade : gemini en primaire (tool calling fiable) → claude si quota dépassé
# qwen3/qwen2.5-coder : utilisables en direct mais incompatibles avec les tools Roo Code
litellm_settings:
  num_retries: 2
  drop_params: true   # ignore les params non supportés (ex. parallel_tool_calls)
  callbacks:
    - config.custom_roo_hook.proxy_handler_instance   # 1. HITL + routage sémantique -> data["model"]
    - config.litellm_hooks.proxy_handler_instance     # 2. TOOL_SCHEMA_PROMPT (si model==worker)
    # Presidio (spec §10.1) : masquer PII avant envoi cloud. Désactiver si Presidio non lancé.
    - presidio
  fallbacks:
    - tier1-n0: [gemini, claude-opus]
    - tier2-n0: [gemini, claude-sonnet]
    - architect: [gemini, claude-sonnet]
    - ingest: [claude-sonnet, qwen2.5]
    - worker: [gemini, claude-sonnet]
    - gemini: [claude-sonnet, hermes3, qwen3]
    - hermes3: [gemini, claude-sonnet]
    - granite3.3: [hermes3, gemini, claude-sonnet]
    - qwen3: [gemini, claude-sonnet]
    - qwen2.5-coder: [gemini, claude-sonnet]
    - qwen2.5: [gemini, claude-sonnet]
