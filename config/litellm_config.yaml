# LiteLLM Proxy — Stratégie Routage Intelligent (spec §5.1, §5.1b)
# Usage: litellm --config config/litellm_config.yaml --port 4000
#
# Clés requises: GOOGLE_API_KEY (ou GEMINI_FREE_KEY), ANTHROPIC_API_KEY
# Cascade Vertex/DeepSeek: VERTEX_PROJECT, DEEPSEEK_API_KEY
# Ingest payant: GEMINI_PAYANT_KEY (optionnel, sinon GOOGLE_API_KEY)

model_list:
  # --- Modèles Ollama (fake_stream + post-call pour Roo, section 3.5) ---
  - model_name: qwen3
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768
  - model_name: qwen2.5-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768
  - model_name: qwen2.5
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
      num_ctx: 32768

  # --- ARCHITECT (spec §1, §5.1b) : Cloud Free → Vertex → DeepSeek ---
  - model_name: architect
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_FREE_KEY  # fallback: GOOGLE_API_KEY (alias dans .env)
  - model_name: architect-vertex
    litellm_params:
      model: vertex_ai/gemini-2.5-pro
      vertex_project: os.environ/VERTEX_PROJECT
  - model_name: architect-deepseek
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # --- INGEST (spec §1, §5.1b) : Gemini Free → Vertex → Payant ---
  - model_name: ingest
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_FREE_KEY  # fallback: GOOGLE_API_KEY (alias dans .env)
  - model_name: ingest-vertex
    litellm_params:
      model: vertex_ai/gemini-2.0-flash
      vertex_project: os.environ/VERTEX_PROJECT
  - model_name: ingest-payant
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_PAYANT_KEY

  # --- WORKER (spec §1, §5.1b) : Local → Gemini Lite → DeepSeek ---
  - model_name: worker
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
      stream_timeout: 60
  - model_name: worker-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_FREE_KEY  # fallback: GOOGLE_API_KEY (alias dans .env)
  - model_name: worker-deepseek
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  # --- Providers cloud (fallbacks transversaux) ---
  - model_name: gemini
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Alias LangGraph (AGILE_USE_LITELLM_PROXY=true) — tiers R0-R6 ---
  - model_name: tier1-n0
    litellm_params:
      model: ollama_chat/qwen2.5:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120
  - model_name: tier2-n0
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://localhost:11434
      fake_stream: true
      timeout: 120

# Paramètres de résilience (spec §5.1b, §1.1)
router_settings:
  routing_strategy: simple-shuffle
  enable_fallbacks: true
  model_cooldown_time: 61
  allowed_fails: 3
  cooldown_time: 3600

litellm_settings:
  num_retries: 2
  drop_params: true
  callbacks:
    - config.custom_roo_hook.proxy_handler_instance   # 1. HITL + routage sémantique -> data["model"]
    - config.litellm_hooks.proxy_handler_instance     # 2. TOOL_SCHEMA_PROMPT (si model==worker)
    # Presidio (spec §10.1) : masquer PII avant envoi cloud. Décommenter + lancer Presidio (start_services)
    # - presidio
  fallbacks:
    - architect: [architect-vertex, architect-deepseek]
    - architect-vertex: [architect-deepseek]
    - ingest: [ingest-vertex, ingest-payant]
    - ingest-vertex: [ingest-payant]
    - worker: [worker-gemini, worker-deepseek]
    - worker-gemini: [worker-deepseek]
    - tier1-n0: [gemini, claude-opus]
    - tier2-n0: [gemini, claude-sonnet]
    - gemini: [claude-sonnet, qwen3]
    - qwen3: [gemini, claude-sonnet]
    - qwen2.5-coder: [gemini, claude-sonnet]
    - qwen2.5: [gemini, claude-sonnet]
